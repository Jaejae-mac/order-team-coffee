<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마블 레이스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Noto Sans KR',sans-serif}

#gameCanvas{position:fixed;inset:0;width:100%;height:100%;display:block}

#minimap{
  position:fixed;top:10px;left:10px;z-index:50;
  border:1px solid rgba(0,255,160,0.5);
  background:#000;display:none;
}

#rankPanel{
  position:fixed;top:0;right:0;bottom:0;width:130px;
  z-index:50;display:none;flex-direction:column;
  padding:12px 8px;overflow:hidden;pointer-events:none;
  background:rgba(0,0,0,0.5);
  border-left:1px solid rgba(0,255,160,0.12);
}
.rank-title{
  font-size:0.6rem;font-weight:700;letter-spacing:0.1em;
  color:rgba(0,255,160,0.5);text-transform:uppercase;
  margin-bottom:8px;padding-bottom:6px;
  border-bottom:1px solid rgba(0,255,160,0.15);
}
.rank-entry{
  display:flex;align-items:center;gap:5px;
  font-size:0.7rem;line-height:1.15;
  padding:2px 0;overflow:hidden;
}
.rank-entry .re-num{
  font-size:0.6rem;color:rgba(255,255,255,0.35);
  min-width:16px;text-align:right;flex-shrink:0;
}
.rank-entry .re-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.rank-entry .re-name{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;
}
.rank-entry.done{opacity:0.38}

#settingsPanel{
  position:fixed;inset:0;
  display:flex;align-items:flex-end;justify-content:flex-start;
  z-index:100;padding:14px;
  pointer-events:none;
}
#settingsPanel.hidden{display:none}
.sbox{
  pointer-events:all;
  background:rgba(0,12,4,0.88);
  border:1.5px solid rgba(0,220,120,0.6);
  border-radius:10px;padding:14px 16px 12px;
  width:min(420px,calc(100vw - 28px));
  box-shadow:inset 0 0 30px rgba(0,180,80,0.08),0 4px 24px rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
}
.sbox h1{
  font-size:1.05rem;font-weight:700;color:#00ff90;
  text-shadow:0 0 10px rgba(0,255,120,0.5);margin-bottom:4px;
}
.sbox-hint{
  font-size:0.67rem;color:rgba(0,220,120,0.65);
  margin-bottom:10px;line-height:1.5;
}
.player-list{
  display:flex;flex-direction:column;gap:5px;
  max-height:180px;overflow-y:auto;margin-bottom:8px;
  scrollbar-width:thin;scrollbar-color:rgba(0,200,100,0.3) transparent;
}
.player-list::-webkit-scrollbar{width:4px}
.player-list::-webkit-scrollbar-thumb{background:rgba(0,200,100,0.3);border-radius:2px}
.player-row{
  display:flex;align-items:center;gap:6px;
}
.player-row .p-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.player-row input{
  flex:1;background:transparent;
  border:none;border-bottom:1px solid rgba(0,200,100,0.25);
  outline:none;color:#fff;font-size:0.82rem;
  padding:2px 4px;font-family:'Noto Sans KR',sans-serif;
  transition:border-color 0.15s;
}
.player-row input:focus{border-color:rgba(0,255,120,0.7);}
.player-row input::placeholder{color:rgba(255,255,255,0.2)}
.player-row .p-del{
  background:none;border:none;cursor:pointer;
  color:rgba(255,80,80,0.5);font-size:1rem;line-height:1;
  padding:0 2px;transition:color 0.15s;flex-shrink:0;
}
.player-row .p-del:hover{color:rgba(255,80,80,1)}
.add-player-btn{
  width:100%;padding:5px;margin-bottom:10px;
  background:transparent;
  border:1px dashed rgba(0,200,100,0.3);border-radius:5px;
  color:rgba(0,200,100,0.6);font-size:0.75rem;cursor:pointer;
  transition:all 0.15s;
}
.add-player-btn:hover{
  border-color:rgba(0,255,120,0.7);color:#00ff90;
  background:rgba(0,200,100,0.05);
}
.sbox-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.sbox select{
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(0,200,100,0.35);
  border-radius:5px;color:#fff;
  font-size:0.75rem;padding:5px 7px;outline:none;cursor:pointer;flex:1;min-width:100px;
}
.sbox-btns{display:flex;gap:6px}
.sbtn{
  flex:1;padding:8px 4px;
  border:1px solid rgba(0,220,120,0.5);
  border-radius:6px;background:transparent;
  color:#00ff90;font-size:0.78rem;font-weight:700;cursor:pointer;
  transition:all 0.15s;letter-spacing:0.04em;
}
.sbtn.primary{background:rgba(0,200,100,0.12);}
.sbtn:hover{background:rgba(0,255,120,0.18);border-color:rgba(0,255,120,0.9)}
.sbox-seed{font-size:0.56rem;color:rgba(0,180,80,0.4);margin-top:6px;text-align:right}

#resultPanel{
  position:fixed;inset:0;display:flex;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.88);z-index:90;
}
#resultPanel.hidden{display:none}
.rbox{
  border:1.5px solid rgba(0,220,120,0.55);border-radius:12px;
  padding:24px 28px;background:rgba(0,12,4,0.92);
  width:min(320px,90vw);text-align:center;
  box-shadow:inset 0 0 30px rgba(0,180,80,0.07);
}
.rbox h2{font-size:1rem;color:#00ff90;margin-bottom:14px;letter-spacing:0.08em}
.podium{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;max-height:280px;overflow-y:auto}
.pod-item{
  display:flex;align-items:center;gap:9px;
  padding:6px 10px;border-radius:6px;font-size:0.78rem;
  border:1px solid transparent;background:rgba(255,255,255,0.03);
}
.pod-item.p1{border-color:rgba(255,215,0,0.5);background:rgba(255,215,0,0.06)}
.pod-item.p2{border-color:rgba(192,192,192,0.4);background:rgba(192,192,192,0.04)}
.pod-item.p3{border-color:rgba(205,127,50,0.4);background:rgba(205,127,50,0.04)}
.pod-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pod-name{flex:1;text-align:left;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pod-rank{font-size:0.65rem;color:rgba(255,255,255,0.35);flex-shrink:0}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="minimap"><canvas id="mmCanvas"></canvas></div>
<div id="rankPanel"><div class="rank-title">순위</div><div id="rankRows"></div></div>

<!-- 설정 패널 -->
<div id="settingsPanel">
  <div class="sbox">
    <h1>🏁 마블 레이스</h1>
    <div class="sbox-hint">이름을 입력하고 START를 눌러 시작하세요</div>
    <div class="player-list" id="playerList"></div>
    <button class="add-player-btn" onclick="addPlayer()">＋ 플레이어 추가</button>
    <div class="sbox-row">
      <select id="mapStyle">
        <option value="standard">표준 맵</option>
        <option value="dense">고밀도</option>
        <option value="chaos">카오스</option>
        <option value="zigzag">지그재그</option>
      </select>
      <select id="mapLength">
        <option value="1">짧은 맵</option>
        <option value="2" selected>보통 맵</option>
        <option value="3">긴 맵</option>
      </select>
    </div>
    <div class="sbox-btns">
      <button class="sbtn primary" onclick="startRace()">▶ START</button>
      <button class="sbtn" onclick="shufflePlayers()">SHUFFLE</button>
    </div>
    <div class="sbox-seed" id="seedDisplay"></div>
  </div>
</div>

<!-- 결과 -->
<div id="resultPanel" class="hidden">
  <div class="rbox">
    <h2>🎉 RACE FINISH</h2>
    <div class="podium" id="podium"></div>
    <button class="sbtn primary" style="width:100%;padding:8px;margin-top:4px" onclick="backToSettings()">↺ 다시 하기</button>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════
   CONSTANTS
═══════════════════════════════════ */
const WORLD_W     = 460;
const GRAVITY     = 0.32;
const RESTITUTION = 0.55;
const FRICTION_H  = 0.991;
const BALL_R      = 8;
const PEG_R       = 5;
const PEG_MIN_GAP = BALL_R * 2 + PEG_R * 2 + 6;
const WALL_MARGIN = BALL_R + PEG_R + 8;
const SECTION_H   = 280;
const BASE_SEC    = 5;
const CAM_RATIO   = 0.38;
const CAM_SMOOTH  = 0.07;
const NEON        = '#00ffaa';
const MM_W = 88, MM_H = 155;

const PAL = [
  '#ff3344','#1a99ff','#22cc55','#ffcc00','#cc44ff',
  '#ff7700','#cccccc','#ff66bb','#00ddcc','#ffdd55',
];

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let canvas, ctx, mmCanvas, mmCtx;
let balls = [], pegs = [], bumpers = [], bars = [];
let worldH = 0, finishY = 0;
let camY = 0, camYTarget = 0;
let particles = [];
let running = false, gameOver = false;
let finishOrder = [];
let animId = null, mapSeed = 0;
let stuckTimer = 0, stuckAccum = 0;
let rankTick = 0;

let playerList = [
  '플레이어 1','플레이어 2','플레이어 3',
  '플레이어 4','플레이어 5','플레이어 6',
];

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
window.addEventListener('load', () => {
  canvas   = document.getElementById('gameCanvas');
  ctx      = canvas.getContext('2d');
  mmCanvas = document.getElementById('mmCanvas');
  mmCtx    = mmCanvas.getContext('2d');
  mmCanvas.width  = MM_W;
  mmCanvas.height = MM_H;
  canvas.width    = window.innerWidth;
  canvas.height   = window.innerHeight;
  renderPlayerList();
});

/* ═══════════════════════════════════
   PLAYER UI
═══════════════════════════════════ */
function renderPlayerList() {
  const el = document.getElementById('playerList');
  el.innerHTML = '';
  playerList.forEach((name, i) => {
    const color = PAL[i % PAL.length];
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <div class="p-dot" style="background:${color};box-shadow:0 0 5px ${color}"></div>
      <input type="text" value="${escHtml(name)}"
        placeholder="플레이어 이름"
        oninput="playerList[${i}]=this.value"
        onkeydown="if(event.key==='Enter'){addPlayer()}" />
      <button class="p-del" onclick="removePlayer(${i})" title="삭제">×</button>
    `;
    el.appendChild(row);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addPlayer() {
  playerList.push('플레이어 ' + (playerList.length + 1));
  renderPlayerList();
  const el = document.getElementById('playerList');
  el.scrollTop = el.scrollHeight;
  const inputs = el.querySelectorAll('input');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function removePlayer(i) {
  if (playerList.length <= 2) return;
  playerList.splice(i, 1);
  renderPlayerList();
}

function shufflePlayers() {
  for (let i = playerList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [playerList[i], playerList[j]] = [playerList[j], playerList[i]];
  }
  renderPlayerList();
}

/* ═══════════════════════════════════
   UI CONTROL
═══════════════════════════════════ */
function backToSettings() {
  stopLoop();
  document.getElementById('resultPanel').classList.add('hidden');
  document.getElementById('settingsPanel').classList.remove('hidden');
  document.getElementById('minimap').style.display = 'none';
  document.getElementById('rankPanel').style.display = 'none';
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function stopLoop() {
  running = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

/* ═══════════════════════════════════
   MAP GENERATION
═══════════════════════════════════ */
function lcg(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
}

function buildMap() {
  pegs = []; bumpers = []; bars = [];

  const style  = document.getElementById('mapStyle').value;
  const lenVal = parseInt(document.getElementById('mapLength').value, 10);
  const lenMul = [0.6, 1, 1.5][lenVal - 1] || 1;
  const numSec = Math.round(BASE_SEC * lenMul);

  mapSeed = Math.floor(Math.random() * 999999);
  const rand = lcg(mapSeed);

  worldH  = 100 + numSec * SECTION_H + 100;
  finishY = worldH - 50;

  const mx = WALL_MARGIN + 2;
  const uw = WORLD_W - mx * 2;
  const allObs = () => [...pegs, ...bumpers, ...bars];

  /* ── 배치 가능 여부 체크 ── */
  function canPlace(x, y, r) {
    if (x - r < WALL_MARGIN || x + r > WORLD_W - WALL_MARGIN) return false;
    for (const e of allObs()) {
      const ex = e.x !== undefined ? e.x : e.cx;
      const ey = e.y !== undefined ? e.y : e.cy;
      const gap = e.type === 'bar' ? PEG_MIN_GAP + (e.hw || 0) : PEG_MIN_GAP;
      if (Math.hypot(ex - x, ey - y) < gap) return false;
    }
    return true;
  }

  function addPeg(x, y) {
    if (canPlace(x, y, PEG_R))
      pegs.push({ x, y, r: PEG_R, flash: 0, fc: '#fff', type: 'peg' });
  }

  function addBumper(x, y, r = 11) {
    if (canPlace(x, y, r))
      bumpers.push({ type: 'bumper', x, y, r, flash: 0 });
  }

  function addBar(cx, cy, hw, angle) {
    const x1 = cx - Math.cos(angle) * hw, y1 = cy - Math.sin(angle) * hw;
    const x2 = cx + Math.cos(angle) * hw, y2 = cy + Math.sin(angle) * hw;
    if (Math.min(x1,x2) < WALL_MARGIN || Math.max(x1,x2) > WORLD_W - WALL_MARGIN) return;
    const tooClose = allObs().some(e => {
      const ex = e.x !== undefined ? e.x : e.cx;
      const ey = e.y !== undefined ? e.y : e.cy;
      return Math.hypot(ex - cx, ey - cy) < hw + PEG_MIN_GAP;
    });
    if (!tooClose)
      bars.push({ type: 'bar', cx, cy, x1, y1, x2, y2, hw, angle, flash: 0 });
  }

  /* ── 삼각격자 행 생성 (수직 레인 차단 핵심) ── */
  function addTriRows(topY, numRows, rowH, cols, dropRate) {
    for (let row = 0; row < numRows; row++) {
      const even = row % 2 === 0;
      const c    = even ? cols : cols - 1;
      const sp   = uw / (even ? cols - 1 : cols - 0.5);
      const offX = even ? mx : mx + sp * 0.5;
      const y    = topY + row * rowH;
      for (let ci = 0; ci < c; ci++) {
        if (rand() < dropRate) continue;
        addPeg(offX + ci * sp, y);
      }
    }
  }

  /* ── 수직 레인 빈 구간 보충 ── */
  function fillVerticalGaps(topY, botY, numLanes = 8) {
    const laneW = uw / numLanes;
    for (let lane = 0; lane < numLanes; lane++) {
      const lx = mx + lane * laneW + laneW * 0.5;
      const hasPeg = pegs.some(p =>
        p.y >= topY && p.y <= botY && Math.abs(p.x - lx) < laneW * 0.6
      );
      if (!hasPeg) {
        const fy = topY + (botY - topY) * (0.3 + rand() * 0.4);
        addPeg(lx + (rand() - 0.5) * 12, fy);
      }
    }
  }

  /* ══ 섹션 테마 함수 ══ */
  function secTri(top) {
    addTriRows(top, 10, SECTION_H / 10, 7, 0.04);
    fillVerticalGaps(top, top + SECTION_H);
  }

  function secDense(top) {
    addTriRows(top, 12, SECTION_H / 12, 8, 0.02);
    fillVerticalGaps(top, top + SECTION_H, 10);
  }

  function secFunnel(top) {
    const midX = WORLD_W * 0.5;
    const midY = top + SECTION_H * 0.5;
    for (let row = 0; row < 5; row++) {
      const t   = row / 4;
      const y   = top + row * (SECTION_H * 0.45 / 5);
      const lx  = mx + uw * 0.05 + uw * 0.3 * t;
      const rx  = WORLD_W - lx;
      const sp  = (rx - lx) / 5;
      for (let c = 0; c <= 5; c++) addPeg(lx + c * sp, y);
    }
    addBar(midX - 40, midY, 45, -0.5);
    addBar(midX + 40, midY, 45, 0.5);
    addTriRows(top + SECTION_H * 0.6, 4, SECTION_H * 0.1, 6, 0.05);
    fillVerticalGaps(top, top + SECTION_H, 7);
  }

  function secScatter(top) {
    const target = 32 + Math.floor(rand() * 12);
    let tries = 0;
    while (pegs.filter(p => p.y >= top && p.y < top + SECTION_H).length < target && tries++ < 400) {
      const x = mx + rand() * uw;
      const y = top + rand() * SECTION_H;
      addPeg(x, y);
    }
    for (let i = 0; i < 3 + Math.floor(rand() * 2); i++) {
      const cx = mx + 40 + rand() * (uw - 80);
      const cy = top + 30 + rand() * (SECTION_H - 60);
      addBar(cx, cy, 28 + rand() * 18, (rand() - 0.5) * 1.1);
    }
    addBumper(mx + 40 + rand() * (uw - 80), top + 60 + rand() * (SECTION_H - 120), 12);
    fillVerticalGaps(top, top + SECTION_H, 8);
  }

  function secVShape(top) {
    const numV = 3;
    const vH   = SECTION_H / numV;
    for (let v = 0; v < numV; v++) {
      const midX = WORLD_W * 0.5;
      const vy   = top + v * vH + vH * 0.3;
      const flip = v % 2 === 0;
      const ang  = 0.4 + rand() * 0.15;
      if (flip) {
        addBar(midX - 55, vy, 48, ang);
        addBar(midX + 55, vy, 48, -ang);
      } else {
        addBar(midX, vy, 60, 0.05);
      }
      addTriRows(top + v * vH, 3, vH * 0.25, 6, 0.05);
    }
    fillVerticalGaps(top, top + SECTION_H, 7);
  }

  function secWide(top) {
    const rowH = SECTION_H / 9;
    for (let row = 0; row < 9; row++) {
      const even    = row % 2 === 0;
      const y       = top + row * rowH;
      const gapSide = even ? 'left' : 'right';
      const cols    = 7;
      const sp      = uw / (cols - 1);
      for (let c = 0; c < cols; c++) {
        const x = mx + c * sp;
        if (gapSide === 'left'  && c < 2) continue;
        if (gapSide === 'right' && c > cols - 3) continue;
        addPeg(x, y);
      }
    }
    fillVerticalGaps(top, top + SECTION_H, 6);
  }

  function secOffset(top) {
    const rowH = SECTION_H / 10;
    for (let row = 0; row < 10; row++) {
      const y      = top + row * rowH;
      const cols   = 6 + (row % 3 === 0 ? 1 : 0);
      const jitter = (rand() - 0.5) * 20;
      const sp     = (uw - 20) / (cols - 1);
      for (let c = 0; c < cols; c++) {
        const x = mx + 10 + jitter + c * sp;
        if (x > WALL_MARGIN && x < WORLD_W - WALL_MARGIN)
          addPeg(x, y);
      }
    }
    addBumper(mx + 50 + rand() * (uw * 0.3), top + 60 + rand() * (SECTION_H * 0.3), 12);
    addBumper(mx + uw * 0.55 + rand() * (uw * 0.3), top + SECTION_H * 0.55 + rand() * (SECTION_H * 0.3), 12);
    fillVerticalGaps(top, top + SECTION_H, 8);
  }

  /* ── 맵 스타일별 섹션 조합 ── */
  const themesByStyle = {
    standard: ['tri','tri','funnel','tri','vshape','tri','wide','tri'],
    dense:    ['dense','dense','funnel','dense','dense','scatter','dense','dense'],
    chaos:    ['scatter','vshape','scatter','funnel','scatter','offset','scatter','vshape'],
    zigzag:   ['wide','wide','funnel','vshape','wide','offset','wide','funnel'],
  };
  const themePool = themesByStyle[style] || themesByStyle.standard;
  const themeFns  = { tri:secTri, dense:secDense, funnel:secFunnel, scatter:secScatter, vshape:secVShape, wide:secWide, offset:secOffset };

  for (let sec = 0; sec < numSec; sec++) {
    const top  = 80 + sec * SECTION_H;
    const name = themePool[sec % themePool.length];
    (themeFns[name] || secTri)(top);
  }

  /* ── 전체 수직 레인 최종 보충 ── */
  const totalLanes = 9;
  for (let lane = 0; lane < totalLanes; lane++) {
    const lx = mx + (uw / totalLanes) * (lane + 0.5);
    for (let sec = 0; sec < numSec; sec++) {
      const top = 80 + sec * SECTION_H;
      const bot = top + SECTION_H;
      const inLane = pegs.filter(p =>
        p.y >= top && p.y < bot && Math.abs(p.x - lx) < (uw / totalLanes) * 0.7
      );
      if (inLane.length < 2) {
        for (let fill = 0; fill < 2; fill++) {
          const fy = top + (SECTION_H / 3) * (fill + 0.5) + (rand() - 0.5) * 20;
          addPeg(lx + (rand() - 0.5) * 12, fy);
        }
      }
    }
  }

  const el = document.getElementById('seedDisplay');
  if (el) el.textContent = `Map #${mapSeed} [${style}]`;
}

/* ═══════════════════════════════════
   BALLS
═══════════════════════════════════ */
function spawnBalls(names) {
  balls = [];
  const n  = names.length;
  const sp = Math.min(40, (WORLD_W - WALL_MARGIN * 2) / Math.max(n, 1));
  const x0 = WORLD_W / 2 - (n - 1) * sp / 2;
  names.forEach((name, i) => {
    balls.push({
      id: i, name: name || `구슬${i + 1}`,
      x: x0 + i * sp + (Math.random() - 0.5) * 3,
      y: 16 + Math.random() * 8,
      vx: (Math.random() - 0.5) * 0.6, vy: 0.3,
      r: BALL_R,
      color: PAL[i % PAL.length],
      trail: [], finished: false, rank: 0,
    });
  });
}

/* ═══════════════════════════════════
   RACE CONTROL
═══════════════════════════════════ */
function startRace() {
  const names = playerList.map(s => s.trim()).filter(Boolean);
  if (names.length < 2) { alert('플레이어를 2명 이상 입력하세요.'); return; }

  stopLoop();
  buildMap();
  spawnBalls(names);

  particles = []; finishOrder = []; running = true; gameOver = false;
  camY = 0; camYTarget = 0; stuckTimer = 0; stuckAccum = 0;

  document.getElementById('settingsPanel').classList.add('hidden');
  document.getElementById('resultPanel').classList.add('hidden');
  document.getElementById('minimap').style.display = 'block';
  document.getElementById('rankPanel').style.display = 'flex';

  buildRankPanel();
  animId = requestAnimationFrame(loop);
}

/* ═══════════════════════════════════
   PHYSICS
═══════════════════════════════════ */
function resolveBar(b, bar) {
  const dx = bar.x2 - bar.x1, dy = bar.y2 - bar.y1;
  const len2 = dx * dx + dy * dy;
  if (len2 < 0.001) return;
  let t = ((b.x - bar.x1) * dx + (b.y - bar.y1) * dy) / len2;
  t = Math.max(0.05, Math.min(0.95, t));
  const cx = bar.x1 + t * dx, cy = bar.y1 + t * dy;
  const ex = b.x - cx, ey = b.y - cy;
  const dist = Math.hypot(ex, ey), minD = b.r + 4;
  if (dist < minD && dist > 0.001) {
    const nx = ex / dist, ny = ey / dist;
    b.x += nx * (minD - dist);
    b.y += ny * (minD - dist);
    const dot = b.vx * nx + b.vy * ny;
    b.vx = (b.vx - 2 * dot * nx) * RESTITUTION;
    b.vy = (b.vy - 2 * dot * ny) * RESTITUTION;
    if (b.vy < 0.4) b.vy = 0.4;
    bar.flash = 1;
    spawnSpark(b.x, b.y, b.color, 4);
  }
}

function physicsStep() {
  let anyActive = false, totalSpeed = 0;

  for (const b of balls) {
    if (b.finished) continue;
    anyActive = true;

    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 16) b.trail.shift();

    b.vy += GRAVITY;
    b.vx *= FRICTION_H;
    b.x  += b.vx;
    b.y  += b.vy;
    totalSpeed += Math.hypot(b.vx, b.vy);

    // 벽
    if (b.x - b.r < 0)       { b.x = b.r;            b.vx =  Math.abs(b.vx) * RESTITUTION; spawnSpark(b.x, b.y, b.color, 3); }
    if (b.x + b.r > WORLD_W) { b.x = WORLD_W - b.r;  b.vx = -Math.abs(b.vx) * RESTITUTION; spawnSpark(b.x, b.y, b.color, 3); }

    // 핀
    for (const peg of pegs) {
      if (Math.abs(peg.y - b.y) > 80) continue;
      const dx = b.x - peg.x, dy = b.y - peg.y;
      const d = Math.hypot(dx, dy), md = b.r + peg.r;
      if (d < md && d > 0.001) {
        const nx = dx / d, ny = dy / d;
        b.x += nx * (md - d); b.y += ny * (md - d);
        const dot = b.vx * nx + b.vy * ny;
        b.vx = (b.vx - 2 * dot * nx) * RESTITUTION + (Math.random() - 0.5) * 0.5;
        b.vy = (b.vy - 2 * dot * ny) * RESTITUTION;
        if (b.vy < 0.5) b.vy = 0.5;
        peg.flash = 1; peg.fc = b.color;
        spawnSpark(b.x, b.y, b.color, 5);
      }
    }

    // 범퍼
    for (const bmp of bumpers) {
      const dx = b.x - bmp.x, dy = b.y - bmp.y;
      const d = Math.hypot(dx, dy), md = b.r + bmp.r;
      if (d < md && d > 0.001) {
        const nx = dx / d, ny = dy / d;
        b.x += nx * (md - d); b.y += ny * (md - d);
        const dot = b.vx * nx + b.vy * ny;
        b.vx = (b.vx - 2 * dot * nx) * 0.8 + nx * 3;
        b.vy = (b.vy - 2 * dot * ny) * 0.8 + ny * 3;
        if (b.vy < 0.8) b.vy = 0.8;
        bmp.flash = 1;
        spawnSpark(b.x, b.y, '#ffe44d', 8);
      }
    }

    // 막대
    for (const bar of bars) {
      if (Math.abs(bar.cy - b.y) > 80) continue;
      resolveBar(b, bar);
    }

    // 볼-볼
    for (const b2 of balls) {
      if (b2 === b || b2.finished) continue;
      const dx = b.x - b2.x, dy = b.y - b2.y;
      const d = Math.hypot(dx, dy), md = b.r + b2.r;
      if (d < md && d > 0.001) {
        const nx = dx / d, ny = dy / d, ov = (md - d) * 0.5;
        b.x  += nx * ov; b.y  += ny * ov;
        b2.x -= nx * ov; b2.y -= ny * ov;
        const dot = (b.vx - b2.vx) * nx + (b.vy - b2.vy) * ny;
        if (dot < 0) {
          b.vx  -= dot * nx * 0.6; b.vy  -= dot * ny * 0.6;
          b2.vx += dot * nx * 0.6; b2.vy += dot * ny * 0.6;
        }
      }
    }

    // 결승선
    if (b.y + b.r >= finishY) {
      b.y = finishY - b.r; b.vx = 0; b.vy = 0; b.finished = true;
      finishOrder.push(b); b.rank = finishOrder.length;
      spawnBurst(b.x, b.y, b.color);
    }
  }

  // stuck 감지
  stuckAccum = stuckAccum * 0.95 + totalSpeed;
  if (++stuckTimer > 90) {
    const ac = balls.filter(b => !b.finished).length;
    if (ac > 0 && stuckAccum / 90 < ac * 0.8) {
      balls.forEach(b => {
        if (!b.finished) { b.vx += (Math.random() - 0.5) * 4; b.vy += 2 + Math.random() * 2; }
      });
    }
    stuckAccum = 0; stuckTimer = 0;
  }

  if (!anyActive && !gameOver) {
    gameOver = true; running = false;
    setTimeout(showResult, 700);
  }
}

/* ═══════════════════════════════════
   CAMERA
═══════════════════════════════════ */
function updateCamera() {
  if (balls.length === 0) return;
  const active = balls.filter(b => !b.finished);
  const ref = active.length > 0
    ? active.reduce((a, b) => (b.y > a.y ? b : a))
    : balls.reduce((a, b) => (b.y > a.y ? b : a));
  const target = ref.y - canvas.height * CAM_RATIO;
  camYTarget = Math.max(0, Math.min(worldH - canvas.height, target));
  camY += (camYTarget - camY) * CAM_SMOOTH;
}

/* ═══════════════════════════════════
   WORLD → SCREEN
═══════════════════════════════════ */
function ws(wx, wy) {
  const rankW  = document.getElementById('rankPanel').offsetWidth || 130;
  const usable = canvas.width - rankW;
  const ox     = (usable - WORLD_W) / 2;
  return { sx: wx + ox, sy: wy - camY };
}

/* ═══════════════════════════════════
   PARTICLES
═══════════════════════════════════ */
function spawnSpark(wx, wy, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 0.4 + Math.random() * 2.5;
    particles.push({ wx, wy, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, decay: 0.06 + Math.random() * 0.05, size: 1 + Math.random() * 2,
      color, type: 'spark' });
  }
}

function spawnBurst(wx, wy, color) {
  for (let i = 0; i < 50; i++) {
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 5;
    particles.push({
      wx, wy,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1.5,
      life: 1,
      decay: 0.009 + Math.random() * 0.01,
      size: 2 + Math.random() * 4,
      color: Math.random() < 0.4 ? '#fff' : color,
      grav: 0.05,
      type: 'confetti',
      rot: Math.random() * Math.PI * 2,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.wx += p.vx; p.wy += p.vy; p.vx *= 0.96;
    if (p.grav) p.vy += p.grav;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  pegs.forEach(p    => { if (p.flash   > 0) p.flash   -= 0.08; });
  bumpers.forEach(b => { if (b.flash   > 0) b.flash   -= 0.07; });
  bars.forEach(b    => { if (b.flash   > 0) b.flash   -= 0.08; });
}

/* ═══════════════════════════════════
   DRAW
═══════════════════════════════════ */
function draw() {
  const cw = canvas.width, ch = canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cw, ch);
  drawWalls();
  drawBars();
  drawPegs();
  drawBumpers();
  drawFinishLine();
  drawStartLine();
  drawTrails();
  drawBalls();
  drawParticles_canvas();
}

function drawWalls() {
  const { sx: x0 } = ws(0, 0);
  const { sx: x1 } = ws(WORLD_W, 0);
  const ch = canvas.height;

  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,160,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x0, 0); ctx.lineTo(x0, ch); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x1, 0); ctx.lineTo(x1, ch); ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#000';
  if (x0 > 0)            ctx.fillRect(0,  0, x0,               ch);
  if (x1 < canvas.width) ctx.fillRect(x1, 0, canvas.width - x1, ch);
}

function drawStartLine() {
  const { sx: x0, sy: y } = ws(0, 40);
  const { sx: x1 }        = ws(WORLD_W, 40);
  if (y < -5 || y > canvas.height + 5) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,150,0.2)'; ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPegs() {
  const ch = canvas.height;
  for (const peg of pegs) {
    const { sx, sy } = ws(peg.x, peg.y);
    if (sy < -15 || sy > ch + 15) continue;
    const f = Math.max(0, peg.flash);
    ctx.save();
    if (f > 0.05) { ctx.shadowColor = peg.fc; ctx.shadowBlur = 10 * f; }
    const r = peg.r;
    ctx.beginPath();
    ctx.moveTo(sx, sy - r); ctx.lineTo(sx + r, sy);
    ctx.lineTo(sx, sy + r); ctx.lineTo(sx - r, sy);
    ctx.closePath();
    ctx.fillStyle = f > 0.05 ? peg.fc : 'rgba(80,120,80,0.9)';
    ctx.fill();
    ctx.restore();
  }
}

function drawBumpers() {
  const ch = canvas.height;
  for (const bmp of bumpers) {
    const { sx, sy } = ws(bmp.x, bmp.y);
    if (sy < -20 || sy > ch + 20) continue;
    const f = Math.max(0, bmp.flash);
    ctx.save();
    ctx.shadowColor = f > 0.2 ? '#ffe44d' : 'rgba(255,200,0,0.3)';
    ctx.shadowBlur  = f > 0.2 ? 18 : 6;
    ctx.beginPath(); ctx.arc(sx, sy, bmp.r, 0, Math.PI * 2);
    ctx.strokeStyle = f > 0.2 ? '#ffe44d' : 'rgba(255,180,0,0.55)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2);
    ctx.fillStyle = f > 0.2 ? '#ffe44d' : 'rgba(255,180,0,0.4)'; ctx.fill();
    ctx.restore();
  }
}

function drawBars() {
  const ch = canvas.height;
  for (const bar of bars) {
    const p1 = ws(bar.x1, bar.y1), p2 = ws(bar.x2, bar.y2);
    if (p1.sy < -30 && p2.sy < -30) continue;
    if (p1.sy > ch + 30 && p2.sy > ch + 30) continue;
    const f = Math.max(0, bar.flash);
    ctx.save();
    if (f > 0.1) { ctx.shadowColor = NEON; ctx.shadowBlur = 10 * f; }
    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
    ctx.strokeStyle = f > 0.1 ? NEON : 'rgba(0,180,100,0.55)';
    ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
    ctx.restore();
  }
}

function drawFinishLine() {
  const { sx: x0, sy: fy } = ws(0, finishY);
  const { sx: x1 }         = ws(WORLD_W, finishY);
  if (fy < -8 || fy > canvas.height + 8) return;
  const bw = 12;
  for (let x = x0; x < x1; x += bw) {
    if (Math.floor((x - x0) / bw) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(x, fy - 4, bw, 8);
    }
  }
  ctx.save();
  ctx.shadowColor = 'rgba(255,215,0,0.7)'; ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(255,215,0,0.9)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x0, fy); ctx.lineTo(x1, fy); ctx.stroke();
  ctx.restore();
  ctx.font = '10px sans-serif'; ctx.fillStyle = 'rgba(255,215,0,0.8)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('FINISH', x0 + 5, fy - 6);
}

function drawTrails() {
  for (const b of balls) {
    if (b.trail.length < 2) continue;
    for (let i = 1; i < b.trail.length; i++) {
      const t  = i / b.trail.length;
      const p0 = ws(b.trail[i - 1].x, b.trail[i - 1].y);
      const p1 = ws(b.trail[i].x,     b.trail[i].y);
      ctx.beginPath(); ctx.moveTo(p0.sx, p0.sy); ctx.lineTo(p1.sx, p1.sy);
      ctx.strokeStyle = b.color;
      ctx.globalAlpha = t * (b.finished ? 0.07 : 0.2);
      ctx.lineWidth   = t * b.r * 1.2;
      ctx.lineCap = 'round'; ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
}

function drawBalls() {
  for (const b of balls) {
    const { sx, sy } = ws(b.x, b.y);
    if (sy < -25 || sy > canvas.height + 25) continue;
    ctx.save();
    ctx.globalAlpha = b.finished ? 0.45 : 1;
    if (!b.finished) { ctx.shadowColor = b.color; ctx.shadowBlur = 16; }
    const g = ctx.createRadialGradient(sx - b.r * 0.3, sy - b.r * 0.3, b.r * 0.05, sx, sy, b.r);
    g.addColorStop(0, 'rgba(255,255,255,0.9)');
    g.addColorStop(0.28, b.color);
    g.addColorStop(1, 'rgba(0,0,0,0.45)');
    ctx.beginPath(); ctx.arc(sx, sy, b.r, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = b.finished ? 0.3 : 0.9;
    ctx.font = 'bold 8px Noto Sans KR';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = b.color;
    ctx.fillText(b.name, sx, sy + b.r + 2);
    if (b.finished && b.rank <= 3) {
      const medals = ['🥇', '🥈', '🥉'];
      ctx.font = `${b.r + 3}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.globalAlpha = 0.85;
      ctx.fillText(medals[b.rank - 1], sx, sy - b.r);
    }
    ctx.restore();
  }
}

function drawParticles_canvas() {
  for (const p of particles) {
    const { sx, sy } = ws(p.wx, p.wy);
    ctx.save(); ctx.globalAlpha = p.life;
    if (p.type === 'spark') {
      ctx.shadowColor = p.color; ctx.shadowBlur = 5;
      ctx.beginPath(); ctx.arc(sx, sy, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    } else {
      ctx.translate(sx, sy); ctx.rotate(p.rot || 0);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    }
    ctx.restore();
  }
}

/* ═══════════════════════════════════
   MINIMAP
═══════════════════════════════════ */
function drawMinimap() {
  if (!worldH) return;
  const mw = MM_W, mh = MM_H;
  mmCtx.fillStyle = '#000';
  mmCtx.fillRect(0, 0, mw, mh);
  const scaleX = mw / WORLD_W, scaleY = mh / worldH;

  mmCtx.fillStyle = 'rgba(60,110,60,0.7)';
  for (const peg of pegs)
    mmCtx.fillRect(peg.x * scaleX - 1, peg.y * scaleY - 1, 2, 2);

  mmCtx.strokeStyle = 'rgba(0,180,100,0.5)'; mmCtx.lineWidth = 1;
  for (const bar of bars) {
    mmCtx.beginPath();
    mmCtx.moveTo(bar.x1 * scaleX, bar.y1 * scaleY);
    mmCtx.lineTo(bar.x2 * scaleX, bar.y2 * scaleY);
    mmCtx.stroke();
  }

  mmCtx.strokeStyle = 'rgba(255,215,0,0.65)'; mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(0, finishY * scaleY); mmCtx.lineTo(mw, finishY * scaleY);
  mmCtx.stroke();

  const vy = camY * scaleY, vh = canvas.height * scaleY;
  mmCtx.strokeStyle = 'rgba(0,255,160,0.5)'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(0, vy, mw, Math.min(vh, mh - vy));

  for (const b of balls) {
    mmCtx.beginPath();
    mmCtx.arc(b.x * scaleX, b.y * scaleY, 2, 0, Math.PI * 2);
    mmCtx.fillStyle = b.finished ? 'rgba(120,120,120,0.5)' : b.color;
    mmCtx.fill();
  }

  mmCtx.strokeStyle = 'rgba(0,255,160,0.3)'; mmCtx.lineWidth = 1;
  mmCtx.beginPath(); mmCtx.moveTo(0, 0); mmCtx.lineTo(0, mh); mmCtx.stroke();
  mmCtx.beginPath(); mmCtx.moveTo(mw - 1, 0); mmCtx.lineTo(mw - 1, mh); mmCtx.stroke();
}

/* ═══════════════════════════════════
   RANK PANEL
═══════════════════════════════════ */
function buildRankPanel() {
  const el = document.getElementById('rankRows');
  el.innerHTML = '';
  [...balls].sort((a, b) => a.id - b.id).forEach(b => {
    const row = document.createElement('div');
    row.className = 'rank-entry';
    row.id = `re-${b.id}`;
    row.innerHTML =
      `<span class="re-num" id="rn-${b.id}">—</span>` +
      `<div class="re-dot" style="background:${b.color};box-shadow:0 0 4px ${b.color}"></div>` +
      `<span class="re-name" style="color:${b.color}" id="rm-${b.id}">${b.name}</span>`;
    el.appendChild(row);
  });
}

function updateRankPanel() {
  if (++rankTick % 4 !== 0) return;
  const sorted = [...balls].sort((a, b) => {
    if (a.finished && !b.finished) return -1;
    if (!a.finished && b.finished) return 1;
    if (a.finished && b.finished)  return a.rank - b.rank;
    return b.y - a.y;
  });
  sorted.forEach((b, i) => {
    const rnEl  = document.getElementById(`rn-${b.id}`);
    const rowEl = document.getElementById(`re-${b.id}`);
    if (!rnEl || !rowEl) return;
    rnEl.textContent  = b.finished
      ? (['🥇','🥈','🥉'][b.rank - 1] || `${b.rank}위`)
      : String(i + 1);
    rowEl.className = 'rank-entry' + (b.finished ? ' done' : '');
  });
}

/* ═══════════════════════════════════
   RESULT
═══════════════════════════════════ */
function showResult() {
  document.getElementById('resultPanel').classList.remove('hidden');
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  const sorted = [...balls].sort((a, b) => a.rank - b.rank);
  sorted.forEach((b, i) => {
    const medals = ['🥇', '🥈', '🥉'];
    const cls    = ['p1', 'p2', 'p3'];
    const d = document.createElement('div');
    d.className = `pod-item ${cls[i] || ''}`;
    d.innerHTML =
      `<span>${medals[i] || `${i + 1}`}</span>` +
      `<div class="pod-dot" style="background:${b.color};box-shadow:0 0 6px ${b.color}"></div>` +
      `<span class="pod-name">${b.name}</span>` +
      `<span class="pod-rank">${b.rank}위</span>`;
    podium.appendChild(d);
  });
}

/* ═══════════════════════════════════
   MAIN LOOP
═══════════════════════════════════ */
function loop() {
  if (running) {
    physicsStep();
    updateCamera();
    updateRankPanel();
  }
  updateParticles();
  draw();
  if (balls.length > 0) drawMinimap();
  animId = requestAnimationFrame(loop);
}
</script>
